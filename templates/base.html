<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - Tobias R.M.K. Meyer</title>
  <meta name="description" content="{{ description|default('Blog posts by Tobias R.M.K. Meyer about embedded systems, firmware development, and software engineering.') }}">
  <meta name="robots" content="index,follow">
  <meta name="author" content="Tobias R.M.K. Meyer">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://www.trmk.de/blog/">
  <meta property="og:title" content="{{ title }} - Tobias R.M.K. Meyer">
  <meta property="og:description" content="{{ description|default('Blog posts about embedded systems, firmware development, and software engineering.') }}">
  <meta property="og:image" content="https://www.trmk.de/avatar.jpg">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="de_DE">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ title }} - Tobias R.M.K. Meyer">
  <meta name="twitter:description" content="{{ description|default('Blog posts about embedded systems, firmware development, and software engineering.') }}">
  <meta name="twitter:image" content="https://www.trmk.de/avatar.jpg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://www.trmk.de/blog/">

  <!-- Color scheme support -->
  <meta name="color-scheme" content="light dark">

  <!-- Favicons & PWA -->
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../manifest.webmanifest">

  <!-- Language metadata -->
  <link rel="alternate" hreflang="en" href="https://www.trmk.de/blog/">
  <link rel="alternate" hreflang="de" href="https://www.trmk.de/blog/">
  <link rel="alternate" hreflang="x-default" href="https://www.trmk.de/blog/">

  <!-- Preload critical resources -->
  <link rel="preload" href="../fonts/lato.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../w3.css">
  <link rel="stylesheet" href="../lato.css">
  <link rel="stylesheet" href="../css/all.css">
  <link rel="stylesheet" href="../modern-enhancements.css">

  <!-- i18n Scripts -->
  <script src="../js/translations.js" defer></script>
  <script src="../js/i18n.js" defer></script>

  <style>
    body {
      font-family: "Lato", sans-serif;
    }
  </style>
</head>

<body>
  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Navigation -->
  <nav class="w3-top" role="navigation" aria-label="Main navigation">
    <div class="w3-bar" id="myNavbar">
      <button class="w3-bar-item w3-button w3-hover-black w3-hide-medium w3-hide-large w3-right"
              onclick="toggleFunction()"
              aria-label="Toggle Navigation Menu"
              aria-expanded="false"
              aria-controls="navDemo">
        <i class="fa fa-bars" aria-hidden="true"></i>
      </button>
      <a href="../index.html#about" class="w3-bar-item w3-button"><span data-i18n="nav.about">ABOUT</span></a>
      <a href="../index.html#portfolio" class="w3-bar-item w3-button w3-hide-small"><i class="fa fa-camera" aria-hidden="true"></i> <span data-i18n="nav.photography">PHOTOGRAPHY</span></a>
      <a href="../freelancing.html" class="w3-bar-item w3-button w3-hide-small"><i class="fa fa-briefcase" aria-hidden="true"></i> <span data-i18n="nav.consulting">CONSULTING</span></a>
      <a href="../cv.html" class="w3-bar-item w3-button w3-hide-small"><i class="fa fa-file-text" aria-hidden="true"></i> <span data-i18n="nav.cv">CV</span></a>
      <a href="./index.html" class="w3-bar-item w3-button w3-hide-small w3-teal"><i class="fa-brands fa-wordpress" aria-hidden="true"></i> <span data-i18n="nav.blog">BLOG</span></a>
      <a href="../index.html#portfolio" class="w3-bar-item w3-button w3-hide-small"><i class="fa fa-camera" aria-hidden="true"></i> <span data-i18n="nav.photography">PHOTOGRAPHY</span></a>
      <a href="../index.html#contact" class="w3-bar-item w3-button w3-hide-small"><i class="fa fa-envelope" aria-hidden="true"></i> <span data-i18n="nav.contact">CONTACT</span></a>
      <select id="language-selector"
              class="w3-select w3-bar-item"
              style="width:auto; background:transparent; color:inherit; border:1px solid currentColor; padding:6px;"
              aria-label="Select language">
        <option value="en">EN</option>
        <option value="de">DE</option>
      </select>
    </div>

    <!-- Mobile navigation -->
    <div id="navDemo" class="w3-bar-block w3-white w3-hide w3-hide-large w3-hide-medium" role="menu">
      <a href="../index.html#about" class="w3-bar-item w3-button" onclick="toggleFunction()" role="menuitem"><i class="fa fa-user" aria-hidden="true"></i> <span data-i18n="nav.about">ABOUT</span></a>
      <a href="../index.html#portfolio" class="w3-bar-item w3-button" onclick="toggleFunction()" role="menuitem"><i class="fa fa-camera" aria-hidden="true"></i> <span data-i18n="nav.photography">PHOTOGRAPHY</span></a>
      <a href="../index.html#contact" class="w3-bar-item w3-button" onclick="toggleFunction()" role="menuitem"><i class="fa fa-envelope" aria-hidden="true"></i> <span data-i18n="nav.contact">CONTACT</span></a>
      <a href="../freelancing.html" class="w3-bar-item w3-button" onclick="toggleFunction()" role="menuitem"><i class="fa fa-briefcase" aria-hidden="true"></i> <span data-i18n="nav.consulting">CONSULTING</span></a>
      <a href="../cv.html" class="w3-bar-item w3-button" onclick="toggleFunction()" role="menuitem"><i class="fa fa-file-text" aria-hidden="true"></i> <span data-i18n="nav.cv">CV</span></a>
      <a href="./index.html" class="w3-bar-item w3-button" onclick="toggleFunction()" role="menuitem"><i class="fa-brands fa-wordpress" aria-hidden="true"></i> <span data-i18n="nav.blog">BLOG</span></a>
      <div class="w3-bar-item" style="padding: 8px 16px;">
        <select id="language-selector-mobile"
                class="w3-select"
                style="width:100%; background:#f1f1f1; color:#000; border:1px solid #ccc; padding:8px;"
                aria-label="Select language">
          <option value="en">English</option>
          <option value="de">Deutsch</option>
        </select>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="w3-content w3-padding-64" style="max-width:900px; margin-top:80px;">
    <div id="main-content"></div>
    {% block content %}{% endblock %}
  </div>

  <!-- Footer -->
  <footer class="w3-container w3-teal w3-center w3-padding-32">
    <p>&copy; 2026 Tobias R.M.K. Meyer. All rights reserved.</p>
    <p><a href="../index.html" class="w3-hover-text-light-grey">Back to main site</a></p>
  </footer>

  <!-- Mobile navigation toggle script -->
  <script>
    function toggleFunction() {
      const navDemo = document.getElementById("navDemo");
      const button = document.querySelector('[aria-controls="navDemo"]');
      const isExpanded = navDemo.classList.contains("w3-show");

      if (isExpanded) {
        navDemo.classList.remove("w3-show");
        button.setAttribute('aria-expanded', 'false');
      } else {
        navDemo.classList.add("w3-show");
        button.setAttribute('aria-expanded', 'true');
      }
    }
  </script>
</body>
</html>
